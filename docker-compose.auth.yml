  #     - KC_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD:-keycloak_pass}
  #     - KEYCLOAK_ADMIN=admin
  #     - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin_password}
  #   depends_on:
  #     - keycloak-db
  #   networks:
  #     - auth-network
  #
  # keycloak-db:
  #   image: postgres:16-alpine
