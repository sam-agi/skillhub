# 统一认证系统部署配置
# 包含：Flarum 桥接服务 + Redis（会话缓存）

version: '3.8'

services:
  # Flarum 认证桥接服务
  flarum-bridge:
    build:
      context: ./server/flarum-bridge
      dockerfile: Dockerfile
    container_name: skillhub-auth-bridge
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      - NODE_ENV=production
      - PORT=8787
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - FLARUM_DB_HOST=${FLARUM_DB_HOST:-flarum-db}
      - FLARUM_DB_PORT=${FLARUM_DB_PORT:-3306}
      - FLARUM_DB_NAME=${FLARUM_DB_NAME:-flarum}
      - FLARUM_DB_USER=${FLARUM_DB_USER:-flarum}
      - FLARUM_DB_PASSWORD=${FLARUM_DB_PASSWORD:-flarum_password}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - auth-network

  # Redis 会话缓存
  redis:
    image: redis:7-alpine
    container_name: skillhub-auth-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - auth-network

  # 可选：Keycloak 作为中央 IdP
  # 取消注释以启用专业级身份管理
